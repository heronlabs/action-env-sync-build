name: Env Sync Build

author: Heron Labs

description: Fan a source branch out into target environment branches — push if clean, open a PR if it conflicts

branding:
  icon: git-merge
  color: blue

inputs:
  source-branch:
    description: Branch to sync from
    required: false
    default: ${{ github.ref_name }}
  target-branches:
    description: Newline/comma-separated list of branches to sync to (e.g. staging, development)
    required: true
  github-token:
    description: >-
      Token with contents:write (merge into targets) and pull-requests:write (open PRs).
      Use a PAT or GitHub App token allowed to update the protected target branches.
    required: true
  merge-message:
    description: Merge-commit subject template; {source} and {target} are substituted
    required: false
    default: 'Merge {source} into {target}'

outputs:
  synced:
    description: Targets cleanly merged (newline list)
  conflicts:
    description: Targets that received a resolution PR (newline list)
  pr-urls:
    description: URLs of opened/reused PRs (newline list)

runs:
  using: node20
  main: dist/index.js
